# Named Cloudflare-tunnel voor de dispatch-endpoint op de Mac.
# Vervangt de quick-tunnel (random trycloudflare-URL) door een VASTE hostname.
#
# VUL IN na `cloudflared tunnel create dispatch-mac`:
#   - <TUNNEL_UUID>  : de UUID die create teruggeeft (ook de bestandsnaam in ~/.cloudflared/)
#   - <TUNNEL_HOSTNAME> : jouw subdomein op je Cloudflare-domein, bijv. dispatch.jouwdomein.nl
#
# De service-poort moet gelijk zijn aan DISPATCH_HTTP_PORT in .env (nu 8787).

tunnel: <TUNNEL_UUID>
credentials-file: /Users/lex/.cloudflared/<TUNNEL_UUID>.json

ingress:
  - hostname: <TUNNEL_HOSTNAME>
    service: http://127.0.0.1:8787
  # Alles wat niet matcht → 404 (geen open proxy).
  - service: http_status:404
